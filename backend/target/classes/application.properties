# ── Server ─────────────────────────────────────────────────────────────────
server.port=8080

# ── Database (H2 in-memory — auto-created on startup, no install needed) ──
spring.datasource.url=jdbc:h2:mem:scamshielddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ── JWT ────────────────────────────────────────────────────────────────────
# Override JWT_SECRET in production with a strong secret (min 32 chars)
jwt.secret=${JWT_SECRET:scamshield-dev-secret-key-change-in-production-xyz}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── External APIs ──────────────────────────────────────────────────────────
# Set real keys as env vars: OPENAI_API_KEY, SAFE_BROWSING_API_KEY
# App starts without them; scan endpoints return 503 if keys are missing/invalid
openai.api-key=${OPENAI_API_KEY:not-configured}
safebrowsing.api-key=${SAFE_BROWSING_API_KEY:not-configured}

# Timeouts (10 seconds)
external.api.connect-timeout-ms=10000
external.api.read-timeout-ms=10000

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.com.scamshield=INFO
logging.level.org.springframework.security=WARN
